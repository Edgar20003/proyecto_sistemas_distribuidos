services:
  worker-1:
    image: docker-worker-1
    container_name: edgar-worker-1
    volumes:
      - ../rust/target/release/worker:/usr/local/bin/worker
    command: ["/usr/local/bin/worker"]
    network_mode: "host"
    restart: on-failure

